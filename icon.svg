<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EDE9FE" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4C1D95" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="512" height="512" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Main wallet body -->
  <rect x="72" y="152" width="368" height="248" rx="36" fill="url(#card)" filter="url(#shadow)"/>

  <!-- Wallet top fold line -->
  <rect x="72" y="228" width="368" height="2" fill="#7C3AED" opacity="0.08"/>

  <!-- Card pocket (right side) -->
  <rect x="292" y="168" width="148" height="128" rx="22" fill="white" opacity="0.92"/>
  <rect x="292" y="168" width="148" height="128" rx="22" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Coin in pocket -->
  <circle cx="366" cy="232" r="32" fill="#FDE68A" opacity="0.9"/>
  <circle cx="366" cy="232" r="32" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <!-- Dollar sign -->
  <text x="366" y="242" font-family="SF Pro Display, -apple-system, sans-serif" font-size="30" font-weight="900" text-anchor="middle" fill="#B45309">$</text>

  <!-- Card info lines on left side -->
  <rect x="96" y="252" width="150" height="11" rx="5.5" fill="#7C3AED" opacity="0.22"/>
  <rect x="96" y="276" width="110" height="11" rx="5.5" fill="#7C3AED" opacity="0.14"/>
  <rect x="96" y="300" width="70"  height="11" rx="5.5" fill="#7C3AED" opacity="0.09"/>

  <!-- Bottom row: chip dots -->
  <circle cx="100" cy="352" r="7" fill="#7C3AED" opacity="0.30"/>
  <circle cx="120" cy="352" r="7" fill="#7C3AED" opacity="0.20"/>
  <circle cx="140" cy="352" r="7" fill="#7C3AED" opacity="0.12"/>

  <!-- Bottom right: amount hint -->
  <rect x="290" y="338" width="130" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
</svg>
